    :root { --bg: #080808; --accent: #d0d0d0; --dim: #3a3a3a; }

    body {
      background: var(--bg);
      color: var(--accent);

      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow: hidden;
      user-select: none;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
      opacity: 0;
      animation: riseIn 1s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 9vw, 100px);
      letter-spacing: 0.1em;
      background: linear-gradient(160deg, #ffffff 0%, #888 60%, #333 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--dim);
      margin-top: 6px;
      text-transform: uppercase;
    }

    .stage {
      position: relative;
      width: min(420px, 88vw);
      opacity: 0;
      animation: riseIn 1s 0.25s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .tee-wrap {
      width: 100%;
      aspect-ratio: 1 / 1.08;
      position: relative;
      cursor: pointer;
    }

    .tee-face {
      position: absolute;
      inset: 0;
      transition: opacity 0s;
    }
    .tee-face img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      will-change: transform, filter;
    }
    .tee-face.hidden { display: none; }

    .hover-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.25em;
      color: #222;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    .stage.peeked .hover-hint { opacity: 0; }

    .side-pill {
      position: absolute;
      top: 12px; right: 12px;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--dim);
      text-transform: uppercase;
      border: 1px solid #222;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 10;
    }

    .controls {
      display: flex;
      align-items: center;
      margin-top: 28px;
      border: 1px solid #1e1e1e;
      border-radius: 3px;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 1s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 11px 22px;
      cursor: pointer;
      transition: color 0.25s, background 0.25s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.03); color: var(--accent); }
    .ctrl-btn.active { color: var(--accent); }
    .flip-btn {
      background: rgba(255,255,255,0.04);
      color: var(--accent);
      border-left: 1px solid #1e1e1e;
      border-right: 1px solid #1e1e1e;
      padding: 11px 28px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: background 0.25s;
    }
    .flip-btn:hover { background: rgba(255,255,255,0.08); }

    .details {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      margin-top: 20px;
      width: min(420px, 88vw);
      border: 1px solid #141414;
      border-radius: 3px;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 1s 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .detail-cell {
      padding: 14px 12px;
      background: #0d0d0d;
      text-align: center;
      border-right: 1px solid #141414;
    }
    .detail-cell:last-child { border-right: none; }
    .detail-cell .lbl { font-size: 8px; letter-spacing: 0.3em; color: var(--dim); text-transform: uppercase; margin-bottom: 5px; }
    .detail-cell .val { font-size: 11px; color: var(--accent); }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
