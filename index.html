<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HU$TLE — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --silver: #b0b0b0;
  }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    cursor: none;
  }

  .cursor {
    position: fixed;
    width: 10px; height: 10px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s;
    mix-blend-mode: difference;
  }
  .cursor.grow { width: 36px; height: 36px; }

  /* GRAIN */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 9998;
  }

  /* SCANLINES */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 9997;
  }

  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* BIG BG LOGO */
  .bg-logo {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(200px, 35vw, 480px);
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.04);
    letter-spacing: 0.04em;
    user-select: none;
    pointer-events: none;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
  }

  /* RADIAL GLOW */
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 65%);
    pointer-events: none;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  /* TOP NAV */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 32px 48px;
    z-index: 10;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.15em;
    color: white;
  }
  .nav-right {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  /* CENTER CONTENT */
  .center {
    position: relative;
    z-index: 5;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--silver);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeIn 0.8s 0.3s forwards;
  }

  /* COUNTDOWN */
  .countdown {
    display: flex;
    gap: 0;
    align-items: flex-end;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeIn 0.8s 0.6s forwards;
  }
  .time-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 clamp(16px, 3vw, 48px);
    position: relative;
  }
  .time-block:not(:last-child)::after {
    content: ':';
    position: absolute;
    right: -4px;
    top: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 11vw, 140px);
    line-height: 1;
    color: rgba(255,255,255,0.15);
  }
  .time-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 11vw, 140px);
    line-height: 1;
    letter-spacing: 0.02em;
    background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.5) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: opacity 0.15s;
    min-width: clamp(60px, 10vw, 130px);
    text-align: center;
    position: relative;
  }
  .time-num.tick {
    animation: numTick 0.15s ease;
  }
  @keyframes numTick {
    0% { opacity: 1; transform: translateY(0); }
    50% { opacity: 0.3; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .time-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-top: 8px;
  }

  /* DIVIDER */
  .divider-line {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeIn 0.8s 0.9s forwards;
  }

  /* DROP TEXT */
  .drop-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeIn 0.8s 1.0s forwards;
  }

  /* EMAIL */
  .notify-form {
    display: flex;
    gap: 0;
    opacity: 0;
    animation: fadeIn 0.8s 1.1s forwards;
  }
  .notify-input {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-right: none;
    color: #fff;
    padding: 14px 24px;
    width: 260px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .notify-input::placeholder { color: rgba(255,255,255,0.25); }
  .notify-input:focus {
    border-color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.08);
  }
  .notify-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    background: #fff;
    color: #000;
    border: none;
    padding: 14px 24px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .notify-btn:hover { background: #ddd; }

  .notify-success {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    display: none;
    padding: 14px 0;
  }

  /* BOTTOM */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 32px 48px;
    z-index: 10;
  }
  .preview-link {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    transition: color 0.2s;
    display: flex; align-items: center; gap: 10px;
  }
  .preview-link:hover { color: rgba(255,255,255,0.7); }
  .preview-link::before {
    content: '';
    display: block;
    width: 24px; height: 1px;
    background: currentColor;
    transition: width 0.3s;
  }
  .preview-link:hover::before { width: 40px; }

  .social-row {
    display: flex; gap: 24px;
  }
  .social-row a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    text-decoration: none;
    transition: color 0.2s;
  }
  .social-row a:hover { color: rgba(255,255,255,0.6); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* PROGRESS BAR */
  .progress-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.05);
    z-index: 20;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(to right, rgba(255,255,255,0.1), rgba(255,255,255,0.5));
    transition: width 1s linear;
  }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>

<div class="page">
  <div class="bg-logo">HU$TLE</div>
  <div class="glow"></div>

  <div class="top-bar">
    <div class="logo">HU$TLE</div>
    <div class="nav-right">Drop 001 — Incoming</div>
  </div>

  <div class="center">
    <p class="eyebrow">The Drop is Coming</p>

    <div class="countdown">
      <div class="time-block">
        <span class="time-num" id="days">00</span>
        <span class="time-label">Days</span>
      </div>
      <div class="time-block">
        <span class="time-num" id="hours">00</span>
        <span class="time-label">Hours</span>
      </div>
      <div class="time-block">
        <span class="time-num" id="minutes">00</span>
        <span class="time-label">Mins</span>
      </div>
      <div class="time-block">
        <span class="time-num" id="seconds">00</span>
        <span class="time-label">Secs</span>
      </div>
    </div>

    <div class="divider-line"></div>
    <p class="drop-date">April 2, 2026 — Vol. 01 Drop</p>

    <div class="notify-form" id="formWrap">
      <input class="notify-input" type="email" placeholder="Enter your email" id="emailInput" />
      <button class="notify-btn" onclick="handleNotify()">Notify Me</button>
    </div>
    <p class="notify-success" id="notifySuccess">✦ &nbsp; You're on the list.</p>
  </div>

  <div class="bottom-bar">
    <a href="store.html" class="preview-link">Preview the Drop</a>
    <div class="social-row">
      <a href="#">Instagram</a>
      <a href="#">Twitter</a>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button, input').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('grow'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('grow'));
  });

  // Countdown
  const target = new Date('2026-04-02T00:00:00').getTime();
  const start = target - (30 * 24 * 60 * 60 * 1000); // 30 days before

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick(id, val) {
    const el = document.getElementById(id);
    const newVal = pad(val);
    if (el.textContent !== newVal) {
      el.classList.remove('tick');
      void el.offsetWidth;
      el.classList.add('tick');
      el.textContent = newVal;
    }
  }

  function updateCountdown() {
    const now = Date.now();
    const diff = target - now;
    if (diff <= 0) {
      document.querySelector('.eyebrow').textContent = 'The Drop Is Live';
      ['days','hours','minutes','seconds'].forEach(id => document.getElementById(id).textContent = '00');
      document.getElementById('progressBar').style.width = '100%';
      return;
    }
    const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    tick('days', days);
    tick('hours', hours);
    tick('minutes', minutes);
    tick('seconds', seconds);
    // progress bar
    const elapsed = now - start;
    const total = target - start;
    const pct = Math.min(100, (elapsed / total) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Notify
  function handleNotify() {
    const val = document.getElementById('emailInput').value.trim();
    if (!val || !val.includes('@')) {
      document.getElementById('emailInput').style.borderColor = 'rgba(255,100,100,0.5)';
      return;
    }
    document.getElementById('formWrap').style.display = 'none';
    document.getElementById('notifySuccess').style.display = 'block';
  }
</script>
</body>
</html>
